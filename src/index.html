<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/favicon/stopwatch.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Pomodoro Timer</title>
</head>
<body>
    <!-- container del pomodoro -->
    <div id="container">
        <!-- il display del timer -->
        <div id="timer">25:00</div>
        <input type="text" name="hidden-input" id="input-hidden-number">

        <!-- buttons per start, pause and reset -->
        <div id="buttons">
            <button id="start"><i class="bi bi-play-fill"></i> Start</button>
            <button id="pause"><i class="bi bi-pause-fill"></i> Pause</button>
            <button id="reset"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
        </div>

        <!-- impostazioni del timer per decidere i tempi -->
        <div id="setting-timer">
            <!-- sezione 1 del timer -->
            <div class="set-pomodoro">
                <button class="minus" id="minus"><i class="bi bi-dash-circle-fill"></i></button>
                <div id="num-pomodoro" class="set-number">25</div>
                <button class="plus" id="plus"><i class="bi bi-plus-circle-fill"></i></button>
            </div>

            <!-- sezione 2 del timer -->
            <div class="set-short-pause">
                <button class="minus" id="minus"><i class="bi bi-dash-circle-fill"></i></button>
                <div id="num-short-pause" class="set-number">5</div>
                <button class="plus" id="plus"><i class="bi bi-plus-circle-fill"></i></button>
            </div>

            <!-- sezione 3 del pomodoro -->
            <div class="set-long-pause">
                <button class="minus" id="minus"><i class="bi bi-dash-circle-fill"></i></button>
                <div id="num-long-pause" class="set-number">15</div>
                <button class="plus" id="plus"><i class="bi bi-plus-circle-fill"></i></button>
            </div>
        </div>
    </div>

    <script src="/src/js/script.js"></script>
</body>
</html>
